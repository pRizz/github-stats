<svg id="gh-dark-mode-only" width="360" height="210" xmlns="http://www.w3.org/2000/svg">
<style>
svg { font-family: -apple-system, BlinkMacSystemFont, Segoe UI, Helvetica, Arial, sans-serif; font-size: 12px; }
#background { width: calc(100% - 10px); height: calc(100% - 10px); fill: white; stroke: rgb(225, 228, 232); stroke-width: 1px; rx: 6px; ry: 6px; }
#gh-dark-mode-only:target #background { fill: #0d1117; stroke-width: 0.5px; }
.title { font-size: 16px; font-weight: 600; fill: rgb(36, 41, 46); }
#gh-dark-mode-only:target .title { fill: #c9d1d9; }
.subtitle, .label { fill: rgb(88, 96, 105); }
