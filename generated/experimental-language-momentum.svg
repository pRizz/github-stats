<svg id="gh-dark-mode-only" width="360" height="210" xmlns="http://www.w3.org/2000/svg">
<style>
svg { font-family: -apple-system, BlinkMacSystemFont, Segoe UI, Helvetica, Arial, sans-serif; font-size: 12px; }
#background { width: calc(100% - 10px); height: calc(100% - 10px); fill: white; stroke: rgb(225, 228, 232); stroke-width: 1px; rx: 6px; ry: 6px; }
#gh-dark-mode-only:target #background { fill: #0d1117; stroke-width: 0.5px; }
.title { font-size: 16px; font-weight: 600; fill: rgb(36, 41, 46); }
#gh-dark-mode-only:target .title { fill: #c9d1d9; }
.subtitle, .label { fill: rgb(88, 96, 105); }
#gh-dark-mode-only:target .subtitle, #gh-dark-mode-only:target .label { fill: #8b949e; }
.value { fill: rgb(36, 41, 46); font-weight: 600; }
#gh-dark-mode-only:target .value { fill: #c9d1d9; }
.metric-bar { fill: #2da44e; }
.empty-bar { fill: rgb(225, 228, 232); }
#gh-dark-mode-only:target .empty-bar { fill: #30363d; }
.row { opacity: 0; transform: translateY(10px); animation: riseIn 600ms ease-out forwards; }
@keyframes riseIn { to { opacity: 1; transform: translateY(0); } }
</style>
<rect x="5" y="5" id="background" />
<text class="title" x="21" y="36">Language Momentum</text>
<text class="subtitle" x="21" y="55">Estimated from recent repo activity</text>
<g class="row" style="animation-delay: 0ms"><text class="label" x="21" y="74">Rust</text><text class="value" x="170" y="74" text-anchor="end">42.1%</text><rect class="metric-bar" x="182" y="64" width="96" height="10" rx="2" style="fill:#dea584" /></g>
<g class="row" style="animation-delay: 80ms"><text class="label" x="21" y="94">TypeScript</text><text class="value" x="170" y="94" text-anchor="end">28.0%</text><rect class="metric-bar" x="182" y="84" width="64" height="10" rx="2" style="fill:#3178c6" /></g>
<g class="row" style="animation-delay: 160ms"><text class="label" x="21" y="114">HTML</text><text class="value" x="170" y="114" text-anchor="end">26.1%</text><rect class="metric-bar" x="182" y="104" width="59" height="10" rx="2" style="fill:#e34c26" /></g>
<g class="row" style="animation-delay: 240ms"><text class="label" x="21" y="134">Shell</text><text class="value" x="170" y="134" text-anchor="end">1.2%</text><rect class="metric-bar" x="182" y="124" width="3" height="10" rx="2" style="fill:#89e051" /></g>
<g class="row" style="animation-delay: 320ms"><text class="label" x="21" y="154">JavaScript</text><text class="value" x="170" y="154" text-anchor="end">1.1%</text><rect class="metric-bar" x="182" y="144" width="3" height="10" rx="2" style="fill:#f1e05a" /></g>
<g class="row" style="animation-delay: 400ms"><text class="label" x="21" y="174">CSS</text><text class="value" x="170" y="174" text-anchor="end">0.6%</text><rect class="metric-bar" x="182" y="164" width="2" height="10" rx="2" style="fill:#663399" /></g>
</svg>
