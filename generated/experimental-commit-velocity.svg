<svg id="gh-dark-mode-only" width="360" height="210" xmlns="http://www.w3.org/2000/svg">
<style>
svg { font-family: -apple-system, BlinkMacSystemFont, Segoe UI, Helvetica, Arial, sans-serif; font-size: 12px; }
#background { width: calc(100% - 10px); height: calc(100% - 10px); fill: white; stroke: rgb(225, 228, 232); stroke-width: 1px; rx: 6px; ry: 6px; }
#gh-dark-mode-only:target #background { fill: #0d1117; stroke-width: 0.5px; }
.title { font-size: 16px; font-weight: 600; fill: rgb(36, 41, 46); }
#gh-dark-mode-only:target .title { fill: #c9d1d9; }
.subtitle, .label { fill: rgb(88, 96, 105); }
#gh-dark-mode-only:target .subtitle, #gh-dark-mode-only:target .label { fill: #8b949e; }
.value { fill: rgb(36, 41, 46); font-weight: 600; }
#gh-dark-mode-only:target .value { fill: #c9d1d9; }
.table-divider { stroke: rgb(225, 228, 232); stroke-width: 1; }
#gh-dark-mode-only:target .table-divider { stroke: #30363d; }
.metric-bar { fill: #2da44e; }
#gh-dark-mode-only:target .language-icon-dark-outline path, #gh-dark-mode-only:target .language-icon-dark-outline circle, #gh-dark-mode-only:target .language-icon-dark-outline ellipse, #gh-dark-mode-only:target .language-icon-dark-outline rect, #gh-dark-mode-only:target .language-icon-dark-outline polygon, #gh-dark-mode-only:target .language-icon-dark-outline polyline, #gh-dark-mode-only:target .language-icon-dark-outline line { stroke: rgba(240, 246, 252, 0.82); stroke-width: 16; stroke-linejoin: round; paint-order: stroke fill markers; }
.empty-bar { fill: rgb(225, 228, 232); }
#gh-dark-mode-only:target .empty-bar { fill: #30363d; }
.row { opacity: 0; transform: translateY(10px); animation: riseIn 600ms ease-out forwards; }
@keyframes riseIn { to { opacity: 1; transform: translateY(0); } }
</style>
<rect x="5" y="5" id="background" />
<text class="title" x="21" y="36">Commit Velocity</text>
<text class="subtitle" x="21" y="55">Exact trailing averages</text>
<g class="row" style="animation-delay: 0ms"><text class="label" x="21" y="86" text-anchor="start">Window</text><text class="label" x="140" y="86" text-anchor="middle">/ hr</text><text class="label" x="200" y="86" text-anchor="middle">/ day</text><text class="label" x="258" y="86" text-anchor="middle">/ wk</text><text class="label" x="316" y="86" text-anchor="middle">/ mo</text></g>
<line class="table-divider" x1="21" y1="96" x2="339" y2="96" />
<g class="row" style="animation-delay: 80ms"><title>30 days: 1,083 commits; 1.50/hr; 36.1/day; 252.7/wk; 1083.0/mo</title><text class="label" x="21" y="118" text-anchor="start">30 days</text><text class="value" x="140" y="118" text-anchor="middle">1.50</text><text class="value" x="200" y="118" text-anchor="middle">36.1</text><text class="value" x="258" y="118" text-anchor="middle">252.7</text><text class="value" x="316" y="118" text-anchor="middle">1083.0</text></g>
<g class="row" style="animation-delay: 160ms"><title>6 months: 6,874 commits; 1.59/hr; 38.2/day; 267.3/wk; 1145.7/mo</title><text class="label" x="21" y="148" text-anchor="start">6 months</text><text class="value" x="140" y="148" text-anchor="middle">1.59</text><text class="value" x="200" y="148" text-anchor="middle">38.2</text><text class="value" x="258" y="148" text-anchor="middle">267.3</text><text class="value" x="316" y="148" text-anchor="middle">1145.7</text></g>
<g class="row" style="animation-delay: 240ms"><title>365 days: 7,028 commits; 0.80/hr; 19.2/day; 134.8/wk; 577.6/mo</title><text class="label" x="21" y="178" text-anchor="start">365 days</text><text class="value" x="140" y="178" text-anchor="middle">0.80</text><text class="value" x="200" y="178" text-anchor="middle">19.2</text><text class="value" x="258" y="178" text-anchor="middle">134.8</text><text class="value" x="316" y="178" text-anchor="middle">577.6</text></g>
</svg>
