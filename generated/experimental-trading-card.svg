<g class="row" style="animation-delay: 240ms"><text class="label" x="21" y="130">Collaboration score</text><text class="value" x="330" y="130" text-anchor="end">52/100</text></g>
<g class="row" style="animation-delay: 320ms"><text class="label" x="21" y="148">Breadth score</text><text class="value" x="330" y="148" text-anchor="end">100/100</text></g>
