<svg id="gh-dark-mode-only" width="360" height="210" xmlns="http://www.w3.org/2000/svg">
<style>
svg { font-family: -apple-system, BlinkMacSystemFont, Segoe UI, Helvetica, Arial, sans-serif; font-size: 12px; }
#background { width: calc(100% - 10px); height: calc(100% - 10px); fill: white; stroke: rgb(225, 228, 232); stroke-width: 1px; rx: 6px; ry: 6px; }
#gh-dark-mode-only:target #background { fill: #0d1117; stroke-width: 0.5px; }
.title { font-size: 16px; font-weight: 600; fill: rgb(36, 41, 46); }
#gh-dark-mode-only:target .title { fill: #c9d1d9; }
.subtitle, .label { fill: rgb(88, 96, 105); }
#gh-dark-mode-only:target .subtitle, #gh-dark-mode-only:target .label { fill: #8b949e; }
.value { fill: rgb(36, 41, 46); font-weight: 600; }
#gh-dark-mode-only:target .value { fill: #c9d1d9; }
.metric-bar { fill: #2da44e; }
.stack-track { fill: rgb(225, 228, 232); }
#gh-dark-mode-only:target .stack-track { fill: rgba(110, 118, 129, 0.4); }
.stack-segment { stroke: rgb(225, 228, 232); stroke-width: 2; }
#gh-dark-mode-only:target .stack-segment { stroke: #393f47; }
#gh-dark-mode-only:target .language-icon-dark-outline path, #gh-dark-mode-only:target .language-icon-dark-outline circle, #gh-dark-mode-only:target .language-icon-dark-outline ellipse, #gh-dark-mode-only:target .language-icon-dark-outline rect, #gh-dark-mode-only:target .language-icon-dark-outline polygon, #gh-dark-mode-only:target .language-icon-dark-outline polyline, #gh-dark-mode-only:target .language-icon-dark-outline line { stroke: rgba(240, 246, 252, 0.82); stroke-width: 16; stroke-linejoin: round; paint-order: stroke fill markers; }
.empty-bar { fill: rgb(225, 228, 232); }
#gh-dark-mode-only:target .empty-bar { fill: #30363d; }
.row { opacity: 0; transform: translateY(10px); animation: riseIn 600ms ease-out forwards; }
@keyframes riseIn { to { opacity: 1; transform: translateY(0); } }
</style>
<rect x="5" y="5" id="background" />
<text class="title" x="21" y="36">Contribution Mix</text>
<text class="subtitle" x="21" y="55">Current year total: 8,156</text>
<defs><clipPath id="contribution-mix-stack-clip"><rect x="21" y="70" width="318" height="8" rx="6" /></clipPath></defs>
<rect class="stack-track" x="21" y="70" width="318" height="8" rx="6" />
<g clip-path="url(#contribution-mix-stack-clip)">
<title>Commits: 7,373</title><rect class="metric-bar stack-segment" x="21" y="70" width="287" height="8" style="fill:#2da44e" />
<title>Restricted: 440</title><rect class="metric-bar stack-segment" x="308" y="70" width="17" height="8" style="fill:#8b949e" />
<title>Pull requests: 231</title><rect class="metric-bar stack-segment" x="325" y="70" width="9" height="8" style="fill:#0969da" />
<title>Repositories: 86</title><rect class="metric-bar stack-segment" x="334" y="70" width="3" height="8" style="fill:#1f6feb" />
<title>Issues: 24</title><rect class="metric-bar stack-segment" x="337" y="70" width="1" height="8" style="fill:#bf8700" />
<title>Reviews: 2</title><rect class="metric-bar stack-segment" x="338" y="70" width="1" height="8" style="fill:#8250df" />
</g>
<g class="row" style="animation-delay: 0ms"><text class="label" x="21" y="98">Commits</text><text class="value" x="330" y="98" text-anchor="end">7,373</text></g>
<g class="row" style="animation-delay: 80ms"><text class="label" x="21" y="114">Restricted</text><text class="value" x="330" y="114" text-anchor="end">440</text></g>
<g class="row" style="animation-delay: 160ms"><text class="label" x="21" y="130">Pull requests</text><text class="value" x="330" y="130" text-anchor="end">231</text></g>
<g class="row" style="animation-delay: 240ms"><text class="label" x="21" y="146">Repositories</text><text class="value" x="330" y="146" text-anchor="end">86</text></g>
<g class="row" style="animation-delay: 320ms"><text class="label" x="21" y="162">Issues</text><text class="value" x="330" y="162" text-anchor="end">24</text></g>
<g class="row" style="animation-delay: 400ms"><text class="label" x="21" y="178">Reviews</text><text class="value" x="330" y="178" text-anchor="end">2</text></g>
</svg>
