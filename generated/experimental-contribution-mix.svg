<svg id="gh-dark-mode-only" width="360" height="210" xmlns="http://www.w3.org/2000/svg">
<style>
svg { font-family: -apple-system, BlinkMacSystemFont, Segoe UI, Helvetica, Arial, sans-serif; font-size: 12px; }
#background { width: calc(100% - 10px); height: calc(100% - 10px); fill: white; stroke: rgb(225, 228, 232); stroke-width: 1px; rx: 6px; ry: 6px; }
#gh-dark-mode-only:target #background { fill: #0d1117; stroke-width: 0.5px; }
.title { font-size: 16px; font-weight: 600; fill: rgb(36, 41, 46); }
#gh-dark-mode-only:target .title { fill: #c9d1d9; }
.subtitle, .label { fill: rgb(88, 96, 105); }
#gh-dark-mode-only:target .subtitle, #gh-dark-mode-only:target .label { fill: #8b949e; }
.value { fill: rgb(36, 41, 46); font-weight: 600; }
#gh-dark-mode-only:target .value { fill: #c9d1d9; }
.metric-bar { fill: #2da44e; }
.empty-bar { fill: rgb(225, 228, 232); }
#gh-dark-mode-only:target .empty-bar { fill: #30363d; }
.row { opacity: 0; transform: translateY(10px); animation: riseIn 600ms ease-out forwards; }
@keyframes riseIn { to { opacity: 1; transform: translateY(0); } }
</style>
<rect x="5" y="5" id="background" />
<text class="title" x="21" y="36">Contribution Mix</text>
<text class="subtitle" x="21" y="55">Current year total: 5,013</text>
<title>Commits: 4,343</title><rect class="metric-bar" x="21" y="78" width="275" height="14" rx="3" style="fill:#2da44e" />
<title>Restricted: 346</title><rect class="metric-bar" x="296" y="78" width="22" height="14" rx="3" style="fill:#8b949e" />
<title>Pull requests: 215</title><rect class="metric-bar" x="318" y="78" width="14" height="14" rx="3" style="fill:#0969da" />
<title>Repositories: 84</title><rect class="metric-bar" x="332" y="78" width="5" height="14" rx="3" style="fill:#1f6feb" />
<title>Issues: 23</title><rect class="metric-bar" x="337" y="78" width="1" height="14" rx="3" style="fill:#bf8700" />
<title>Reviews: 2</title><rect class="metric-bar" x="338" y="78" width="1" height="14" rx="3" style="fill:#8250df" />
<g class="row" style="animation-delay: 0ms"><text class="label" x="21" y="108">Commits</text><text class="value" x="330" y="108" text-anchor="end">4,343</text></g>
<g class="row" style="animation-delay: 80ms"><text class="label" x="21" y="124">Restricted</text><text class="value" x="330" y="124" text-anchor="end">346</text></g>
<g class="row" style="animation-delay: 160ms"><text class="label" x="21" y="140">Pull requests</text><text class="value" x="330" y="140" text-anchor="end">215</text></g>
<g class="row" style="animation-delay: 240ms"><text class="label" x="21" y="156">Repositories</text><text class="value" x="330" y="156" text-anchor="end">84</text></g>
<g class="row" style="animation-delay: 320ms"><text class="label" x="21" y="172">Issues</text><text class="value" x="330" y="172" text-anchor="end">23</text></g>
<g class="row" style="animation-delay: 400ms"><text class="label" x="21" y="188">Reviews</text><text class="value" x="330" y="188" text-anchor="end">2</text></g>
</svg>
