<svg id="gh-dark-mode-only" width="360" height="210" xmlns="http://www.w3.org/2000/svg">
<style>
svg {
  font-family: -apple-system, BlinkMacSystemFont, Segoe UI, Helvetica, Arial, sans-serif, Apple Color Emoji, Segoe UI Emoji;
  font-size: 14px;
}

#background {
  width: calc(100% - 10px);
  height: calc(100% - 10px);
  fill: white;
  stroke: rgb(225, 228, 232);
  stroke-width: 1px;
  rx: 6px;
  ry: 6px;
}

#gh-dark-mode-only:target #background {
  fill: #0d1117;
  stroke-width: 0.5px;
}

.title {
  font-size: 16px;
  font-weight: 600;
  fill: rgb(36, 41, 46);
}

#gh-dark-mode-only:target .title {
  fill: #c9d1d9;
}

.subtitle,
.month,
.count {
  fill: rgb(88, 96, 105);
}

#gh-dark-mode-only:target .subtitle,
#gh-dark-mode-only:target .month,
#gh-dark-mode-only:target .count {
  fill: #8b949e;
}

.subtitle {
  font-size: 11px;
}

.month {
  font-size: 8px;
}

.count {
  font-size: 9px;
}

.axis {
  stroke: rgb(225, 228, 232);
  stroke-width: 1px;
}

#gh-dark-mode-only:target .axis {
  stroke: #30363d;
}

.bar {
  fill: #2da44e;
}

#gh-dark-mode-only:target .bar {
  fill: #3fb950;
}

.bar.current {
  fill: #0969da;
}

#gh-dark-mode-only:target .bar.current {
  fill: #58a6ff;
}

g {
  opacity: 0;
  transform: translateY(16px);
  animation: riseIn 700ms ease-out forwards;
}

@keyframes riseIn {
  to {
    opacity: 1;
    transform: translateY(0);
  }
}
</style>
<rect x="5" y="5" id="background" />
<text class="title" x="21" y="36">Monthly Commits</text>
<text class="subtitle" x="21" y="55">4,373 commits over 13 months; May &#x27;26 has 212</text>
<line class="axis" x1="21" y1="154" x2="339" y2="154" />
<g style="animation-delay: 0ms"><title>May &#x27;25: 10 commits</title><rect class="bar" x="27" y="150" width="14" height="3" rx="2" /><text class="count" x="34.0" y="145" text-anchor="middle">10</text><text class="month" x="34.0" y="174" text-anchor="end" transform="rotate(-35 34.0 174)">May &#x27;25</text></g>
<g style="animation-delay: 75ms"><title>Jun &#x27;25: 161 commits</title><rect class="bar" x="51" y="146" width="14" height="7" rx="2" /><text class="count" x="58.0" y="141" text-anchor="middle">161</text><text class="month" x="58.0" y="174" text-anchor="end" transform="rotate(-35 58.0 174)">Jun &#x27;25</text></g>
<g style="animation-delay: 150ms"><title>Jul &#x27;25: 95 commits</title><rect class="bar" x="75" y="149" width="14" height="4" rx="2" /><text class="count" x="82.0" y="144" text-anchor="middle">95</text><text class="month" x="82.0" y="174" text-anchor="end" transform="rotate(-35 82.0 174)">Jul &#x27;25</text></g>
