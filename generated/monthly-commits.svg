<g style="animation-delay: 300ms"><title>Sep &#x27;25: 49 commits</title><rect class="bar" x="123" y="150" width="14" height="3" rx="2" /><text class="count" x="130.0" y="145" text-anchor="middle">49</text><text class="month" x="130.0" y="174" text-anchor="end" transform="rotate(-35 130.0 174)">Sep &#x27;25</text></g>
